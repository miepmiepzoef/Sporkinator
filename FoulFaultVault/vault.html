<!DOCTYPE html>
<html lang="en">
<head>
    <title>FoulFaultVault – Saved Cases</title>
    <link rel="stylesheet" href="../css/style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: system-ui, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 28px; padding: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        h1 { margin-top: 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; vertical-align: top; }
        th { background: #0a1c2f; color: white; }
        tr:nth-child(even) { background: #f9f9f9; }
        button { background: #0a1c2f; border: none; padding: 8px 16px; border-radius: 40px; color: white; cursor: pointer; margin-right: 10px; margin-bottom: 10px; }
        button:hover { background: #1e3a5f; }
        .delete-btn { background: #0a1c2f; }
        .delete-btn:hover { background: #1e3a5f; }
        .back-btn { background: #0a1c2f; }
        .actions { white-space: nowrap; }
    </style>
</head>
<body>
<div id="header-placeholder"></div>
<div class="container">
    <h1>📂 Vault – Saved Analyses</h1>
    <button id="refreshBtn" class="back-btn">⟳ Refresh</button>
    <button id="deleteAllBtn" class="delete-btn">🗑 Delete All</button>
    <button id="backBtn" class="back-btn">← Back to Search</button>
    <div id="vaultContent">
        <p>Loading saved cases...</p>
    </div>
</div>
<div id="footer-placeholder"></div>
<script>
    // Load header and footer (same as index)
    fetch('../header.html').then(r => r.text()).then(data => document.getElementById('header-placeholder').innerHTML = data);
    fetch('../footer.html').then(r => r.text()).then(data => document.getElementById('footer-placeholder').innerHTML = data);

    function renderVault() {
        const stored = localStorage.getItem('ffv_analyses');
        let analyses = [];
        if (stored) {
            analyses = JSON.parse(stored);
        }
        const container = document.getElementById('vaultContent');
        if (!analyses.length) {
            container.innerHTML = '<p>No saved analyses yet. Go back and save some cases.</p>';
            return;
        }
        let html = `<table>
            <thead>
                <tr><th>Timestamp</th><th>Title</th><th>SHOUT</th><th>WHISPER</th><th>THIRD LAYER</th><th>Sacrificial</th><th>Lenses</th><th>Confidence</th><th>Actions</th></tr>
            </thead>
            <tbody>`;
        analyses.forEach((item, idx) => {
            html += `<tr>
                <td>${escapeHtml(item.timestamp || '')}</td>
                <td><a href="${escapeHtml(item.url)}" target="_blank">${escapeHtml(item.title)}</a></td>
                <td>${escapeHtml(item.shout || '')}</td>
                <td>${escapeHtml(item.whisper || '')}</td>
                <td>${escapeHtml(item.thirdLayer || '')}</td>
                <td>${escapeHtml(item.sacrificial || '')}</td>
                <td>${escapeHtml(item.lenses || '')}</td>
                <td>${escapeHtml(item.confidence || '')}</td>
                <td class="actions"><button class="delete-single" data-idx="${idx}">Delete</button></td>
            </tr>`;
        });
        html += `</tbody></table>`;
        container.innerHTML = html;

        // Attach delete single event listeners
        document.querySelectorAll('.delete-single').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.dataset.idx);
                let analysesCurrent = JSON.parse(localStorage.getItem('ffv_analyses') || '[]');
                analysesCurrent.splice(idx, 1);
                localStorage.setItem('ffv_analyses', JSON.stringify(analysesCurrent));
                renderVault(); // re-render
            });
        });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    document.getElementById('refreshBtn').addEventListener('click', renderVault);
    document.getElementById('deleteAllBtn').addEventListener('click', () => {
        if (confirm('Delete ALL saved analyses? This cannot be undone.')) {
            localStorage.removeItem('ffv_analyses');
            renderVault();
        }
    });
    document.getElementById('backBtn').addEventListener('click', () => {
        window.location.href = 'index.html'; // adjust path if needed
    });

    renderVault();
</script>
</body>
</html>
