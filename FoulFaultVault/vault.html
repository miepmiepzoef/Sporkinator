<!DOCTYPE html>
<html lang="en">
<head>
    <title>FoulFaultVault – Saved Cases</title>
    <link rel="stylesheet" href="../css/style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .vault-container { max-width: 1400px; margin: 20px auto; background: white; /*border-radius: 28px; padding: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); */}
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; vertical-align: top; }
        th { background: #0a1c2f; color: white; }
        .delete-btn { background: #0a1c2f; color: white; border: none; padding: 4px 10px; border-radius: 20px; cursor: pointer; }
        .delete-btn:hover { background: #c33; }
        .back-btn { background: #0a1c2f; margin-right: 10px; }
        .search-input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 28px; border: 1px solid #ccc; font-size: 1rem; }
    </style>
</head>
<body>
<div id="header-placeholder"></div>
    <h1>Vault</h1>
    <p class="citation">Access Granted</p>
<div class="vault-container">
    <p class="instructions"> Saved Files</p>
    <input type="text" id="searchInput" class="search-input" placeholder="🔍 Filter by title, shout, whisper, third layer, lenses, confidence...">
    <button id="refreshBtn" class="back-btn">⟳ Refresh</button>
    <button id="backBtn" class="back-btn">← Back to Search</button>
    <div id="vaultContent"><p>Loading...</p></div>
</div>
<div id="footer-placeholder"></div>
    <div id="banner-placeholder"></div>
<script>
    fetch('../header.html').then(r => r.text()).then(d => document.getElementById('header-placeholder').innerHTML = d);
    fetch('../footer.html').then(r => r.text()).then(d => document.getElementById('footer-placeholder').innerHTML = d);
    fetch('../banner.html').then(r => r.text()).then(d => document.getElementById('banner-placeholder').innerHTML = d);
    // Example case to pre‑populate if vault is empty
    const exampleCase = {
        timestamp: new Date().toISOString(),
        title: "Example: Watergate Scandal",
        url: "https://en.wikipedia.org/wiki/Watergate",
        shout: "President Nixon: 'I am not a crook.'",
        whisper: "Some journalists questioned the official denial.",
        thirdLayer: "Secret recordings revealed cover‑up. (Sources: Washington Post, Senate hearings)",
        sacrificial: "Two aides resigned; no prosecution of Nixon.",
        lenses: "Limited Hangout, Teflon Shield",
        confidence: "High"
    };

    function render() {
        const stored = localStorage.getItem('ffv_analyses');
        let analyses = stored ? JSON.parse(stored) : [];

        // If empty, add example case
        if (analyses.length === 0) {
            analyses = [exampleCase];
            localStorage.setItem('ffv_analyses', JSON.stringify(analyses));
        }

        const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
        const filtered = analyses.filter(item => {
            return (item.title?.toLowerCase().includes(searchTerm) ||
                    item.shout?.toLowerCase().includes(searchTerm) ||
                    item.whisper?.toLowerCase().includes(searchTerm) ||
                    item.thirdLayer?.toLowerCase().includes(searchTerm) ||
                    item.sacrificial?.toLowerCase().includes(searchTerm) ||
                    item.lenses?.toLowerCase().includes(searchTerm) ||
                    item.confidence?.toLowerCase().includes(searchTerm));
        });

        const container = document.getElementById('vaultContent');
        if (!filtered.length) {
            container.innerHTML = '<p>No matching cases. Try a different search term.</p>';
            return;
        }
        let html = `<table><thead><tr><th>Date</th><th>Title</th><th>SHOUT</th><th>WHISPER</th><th>THIRD LAYER</th><th>Sacrificial</th><th>Lenses</th><th>Confidence</th><th></th></tr></thead><tbody>`;
        filtered.forEach((a, idx) => {
            // Need original index for deletion (from full array, not filtered)
            const originalIndex = analyses.findIndex(orig => orig.title === a.title && orig.url === a.url);
            html += `<tr>
                <td>${escapeHtml(a.timestamp || '')}</td>
                <td><a href="${escapeHtml(a.url)}" target="_blank">${escapeHtml(a.title)}</a></td>
                <td>${escapeHtml(a.shout || '')}</td>
                <td>${escapeHtml(a.whisper || '')}</td>
                <td>${escapeHtml(a.thirdLayer || '')}</td>
                <td>${escapeHtml(a.sacrificial || '')}</td>
                <td>${escapeHtml(a.lenses || '')}</td>
                <td>${escapeHtml(a.confidence || '')}</td>
                <td><button class="delete-btn" data-index="${originalIndex}">Delete</button></td>
            </tr>`;
        });
        html += `</tbody></table>`;
        container.innerHTML = html;

        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                let idx = parseInt(btn.dataset.index);
                let current = JSON.parse(localStorage.getItem('ffv_analyses') || '[]');
                current.splice(idx, 1);
                localStorage.setItem('ffv_analyses', JSON.stringify(current));
                render(); // re-render with updated data
            });
        });
    }

    function escapeHtml(s) { 
        if (!s) return '';
        return String(s).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    document.getElementById('refreshBtn').addEventListener('click', render);
    document.getElementById('backBtn').addEventListener('click', () => window.location.href = 'index.html');
    document.getElementById('searchInput').addEventListener('input', render);
    render();
</script>
</body>
</html>
