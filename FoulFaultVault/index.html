	<!DOCTYPE html>
<html lang="en">
<head>
    <title>FoulFaultVault</title>
		<link rel="stylesheet" href="../css/style.css">
		<meta charset="UTF-8> 
		<meta name="description" content="Foul, Fault, Vault, Search Engine">
		<meta name="keywords" content="Bananas, Sporkinator, Cutlery, Foul, Fault, Vault, Search Engine"> 
		<meta name="author" content="Muppet">
		<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <style>
        .container {
			text-align: center;
			padding-top: 10px;
            max-width: 1400px;
            margin: 0 auto;
			align-items: center;
        }
        .search-area {
			text-align: center;
            padding: 24px 32px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            flex-wrap: wrap;
			justify-content: center;
            gap: 16px;
            align-items: flex-end;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .input-group label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #1e293b;
			text-align: right;
			width: 100%;
        }
        input, select {
            padding: 8px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 0.85rem;
            background: white;
        }
        button {
            background: #0a1c2f;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
			white-space: nowrap;
        }
        button:hover {
            background: #1e3a5f;
        }
        .reset-btn {
            background: #0a1c2f;
        }
        .settings-btn {
            background:#0a1c2f;
        }
        .export-btn {
            background: #0a1c2f;
        }
        .status {
            padding: 12px 32px;
            background: #eef2ff;
            font-size: 0.85rem;
            color: #1e293b;
            border-bottom: 1px solid #e2e8f0;
        }
        .results {
            padding: 24px 32px;
        }
        .result-item {
            border-bottom: 1px solid #e9edf2;
            padding: 20px 0;
        }
        .result-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .result-title a {
            color: #0a1c2f;
            text-decoration: none;
        }
        .result-title a:hover {
            text-decoration: underline;
        }
        .result-snippet {
            color: #3b4e66;
            font-size: 0.85rem;
            margin: 8px 0;
            line-height: 1.4;
        }
        .result-meta {
            display: flex;
            gap: 16px;
            font-size: 0.75rem;
            color: #5a6e8a;
            margin-bottom: 12px;
        }
        .analyze-btn {
            background: #2c5a2e;
            padding: 6px 16px;
            font-size: 0.75rem;
            border-radius: 30px;
            margin-top: 8px;
        }
        .analysis-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            width: 90%;
            max-width: 750px;
            max-height: 85vh;
            overflow-y: auto;
            border-radius: 32px;
            padding: 24px;
            position: relative;
        }
        .modal-content h3 {
            margin-top: 0;
        }
        .close-modal {
   			color: #000;
    		background: #eee;
   			border-radius: 50%;
   			width: 32px;
		    height: 32px;
		    position: absolute;
		    right: 20px;
 		    top: 16px;
  		    font-size: 28px;
 		    cursor: pointer;
   			border: none;
    		display: flex;
   			align-items: center;
   			justify-content: center;
		}
        .layer-field {
            margin-bottom: 16px;
        }
        .layer-field label {
            font-weight: 700;
            display: block;
            margin-bottom: 6px;
            color: #0a1c2f;
        }
        .layer-field textarea, .layer-field input {
            width: 100%;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #ccc;
            font-family: monospace;
            font-size: 0.85rem;
        }
        .save-note {
            font-size: 0.75rem;
            color: #2c5a2e;
            margin-top: 8px;
        }
        hr {
            margin: 16px 0;
        }
        .settings-panel {
            display: none;
            background: #f1f5f9;
            padding: 16px 32px;
            border-bottom: 1px solid #e2e8f0;
        }
        .settings-panel input {
            width: 300px;
        }
        /*footer {
            text-align: center;
            padding: 24px;
            font-size: 0.75rem;
            color: #5a6e8a;
        }*/
        .auto-btn {
            background: #0f5c6b;
            margin-left: 10px;
        }
		.search-area button {
			align-self: flex-end;
			margin-bottom: 0;
		}
    </style>
</head>
<body>
<div id="header-placeholder"></div>
<h1>FoulFaultVault</h1>
<p class="citation">Version 1.1</p>
	 <h2>Search for Faults</h2>
<div class="container">
   
	<div class="search-area">
			<div class="input-group"><label>📅 Year (required)</label><input type="number" id="yearInput" placeholder="e.g., 2005" value="2005"></div>
			<div class="input-group"><label>🏷️ Keyword (optional)</label><input type="text" id="keywordInput" placeholder="scandal, cover‑up, leak..."></div>
            <button id="searchBtn">🔎 Search Wikipedia</button>
            <button id="resetBtn" class="reset-btn">⟳ Reset</button>
            <button id="exportBtn" class="export-btn">📤 Export analyses</button>
			<button id="vaultBtn" class="export-btn">📂 Fold</button>
	</div>
	<div class="status" id="statusMsg">⚡ Enter a year and click Search. Then click "Analyze".</div>
	<div class="results" id="resultsContainer"></div>
</div>

<div id="analysisModal" class="analysis-modal">
    <div class="modal-content">
        
        <h3>📝 FoulFault analysis</h3>
        <p><strong>Case:</strong> <span id="modalCaseTitle"></span><br><small>🔗 <a id="modalCaseUrl" href="#" target="_blank">open Wikipedia article</a></small></p>
        <div class="layer-field"><label>📢 SHOUT (official narrative)</label><textarea id="shoutField" rows="2" readonly></textarea></div>
        <div class="layer-field"><label>🤫 WHISPER (safe criticism)</label><textarea id="whisperField" rows="2" readonly></textarea></div>
        <div class="layer-field"><label>🕳️ THIRD LAYER (hidden operation) – requires ≥2 sources</label><textarea id="thirdLayerField" rows="3" readonly></textarea></div>
        <div class="layer-field"><label>🐑 SACRIFICIAL LAYER (what was offered up)</label><textarea id="sacrificialField" rows="2" readonly></textarea></div>
        <div class="layer-field"><label>🔎 Lenses (Black Box, Zombie File, etc.)</label><input type="text" id="lensesField" readonly></div>
        <div class="layer-field"><label>🎯 Confidence (High / Medium / Low)</label><input type="text" id="confidenceField" readonly></div>
        <button id="saveAnalysisBtn" style="margin-top:12px; background:#0a1c2f;">💾 Save</button>
		<button class="close-modal" id="closeModalBtn">&times;</button>
	</div>
</div>
<div id="footer-placeholder"></div>		
<div id="banner-placeholder"></div>
<script>
	  // Load header, footer, banner
    fetch('../header.html').then(r => r.text()).then(data => document.getElementById('header-placeholder').innerHTML = data);
    fetch('../footer.html').then(r => r.text()).then(data => document.getElementById('footer-placeholder').innerHTML = data);
    fetch('../footer-banner.html').then(r => r.text()).then(data => document.getElementById('banner-placeholder').innerHTML = data);

    const PROXY_URL = 'https://vault-d9s2z.bunny.run';
    let currentCase = null;
    let analyses = [];

    // DOM elements
    const searchBtn = document.getElementById('searchBtn');
    const resetBtn = document.getElementById('resetBtn');
    const exportBtn = document.getElementById('exportBtn');
    const vaultBtn = document.getElementById('vaultBtn');
    const yearInput = document.getElementById('yearInput');
    const keywordInput = document.getElementById('keywordInput');
    const statusDiv = document.getElementById('statusMsg');
    const resultsContainer = document.getElementById('resultsContainer');
    const modal = document.getElementById('analysisModal');
    const modalCaseTitle = document.getElementById('modalCaseTitle');
    const modalCaseUrl = document.getElementById('modalCaseUrl');
    const shoutField = document.getElementById('shoutField');
    const whisperField = document.getElementById('whisperField');
    const thirdLayerField = document.getElementById('thirdLayerField');
    const sacrificialField = document.getElementById('sacrificialField');
    const lensesField = document.getElementById('lensesField');
    const confidenceField = document.getElementById('confidenceField');
    const saveAnalysisBtn = document.getElementById('saveAnalysisBtn');
    const closeModalBtn = document.getElementById('closeModalBtn');

    // Load existing analyses from localStorage
    function loadAnalysesFromStorage() {
        const stored = localStorage.getItem('ffv_analyses');
        analyses = stored ? JSON.parse(stored) : [];
    }
    function saveAnalysesToStorage() {
        localStorage.setItem('ffv_analyses', JSON.stringify(analyses));
    }
    loadAnalysesFromStorage();

    // Helper: save current case and return true/false
    function saveCurrentAndClose() {
        if (!currentCase) return false;
        // Don't save if analysis failed or still loading
        if (shoutField.value.startsWith('⏳') || shoutField.value.startsWith('❌')) {
            alert('Analysis not ready or failed. Please wait.');
            return false;
        }
        const newAnalysis = {
            timestamp: new Date().toISOString(),
            title: currentCase.title,
            url: currentCase.url,
            shout: shoutField.value,
            whisper: whisperField.value,
            thirdLayer: thirdLayerField.value,
            sacrificial: sacrificialField.value,
            lenses: lensesField.value,
            confidence: confidenceField.value
        };
        const existingIndex = analyses.findIndex(a => a.title === newAnalysis.title && a.url === newAnalysis.url);
        if (existingIndex !== -1) {
            analyses[existingIndex] = newAnalysis;
        } else {
            analyses.push(newAnalysis);
        }
        saveAnalysesToStorage();
        return true;
    }

    // Wikipedia search
    async function searchWikipedia(year, keyword) {
        let searchTerm = `${year}`;
        if (keyword && keyword.trim() !== '') {
            searchTerm = `${year} ${keyword}`;
        } else {
            searchTerm = `${year} scandal OR cover-up OR corruption OR whistleblower OR leak OR investigation`;
        }
        const url = `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(searchTerm)}&format=json&origin=*&srlimit=25`;
        const resp = await fetch(url);
        const data = await resp.json();
        return data.query.search.map(page => ({
            title: page.title,
            snippet: page.snippet.replace(/<span class="searchmatch">/g, '<strong>').replace(/<\/span>/g, '</strong>'),
            url: `https://en.wikipedia.org/wiki/${encodeURIComponent(page.title.replace(/ /g, '_'))}`,
            source: 'Wikipedia'
        }));
    }

    async function performSearch() {
        const year = yearInput.value.trim();
        if (!year || isNaN(year) || year < 1900 || year > 2030) {
            statusDiv.innerHTML = '⚠️ Please enter a valid year (1900–2030).';
            return;
        }
        const keyword = keywordInput.value.trim();
        statusDiv.innerHTML = `🔍 Searching Wikipedia for "${year}" ${keyword ? `+ "${keyword}"` : '...'}`;
        resultsContainer.innerHTML = '<div style="padding:24px; text-align:center;">⏳ Loading...</div>';
        try {
            const results = await searchWikipedia(year, keyword);
            if (!results.length) {
                resultsContainer.innerHTML = '<p>No results. Try different keyword</p>';
                statusDiv.innerHTML = 'No results.';
                return;
            }
            let html = '';
            for (const r of results) {
                html += `<div class="result-item">
                    <strong><a href="${escapeHtml(r.url)}" target="_blank">${escapeHtml(r.title)}</a></strong>
                    <p>${r.snippet}...</p>
                    <button class="analyze-btn" data-title="${escapeHtml(r.title)}" data-url="${r.url}">🧩 Analyze</button>
                </div>`;
            }
            resultsContainer.innerHTML = html;
            statusDiv.innerHTML = `✅ Found ${results.length} articles. Click "Analyze".`;
            // Attach analyze buttons with auto‑analysis, auto‑save, and redirect
            document.querySelectorAll('.analyze-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    currentCase = { title: btn.dataset.title, url: btn.dataset.url };
                    modalCaseTitle.innerText = currentCase.title;
                    modalCaseUrl.href = currentCase.url;

                    // Show modal with loading message
                    shoutField.value = '⏳ Fetching article...';
                    whisperField.value = '';
                    thirdLayerField.value = '';
                    sacrificialField.value = '';
                    lensesField.value = '';
                    confidenceField.value = '';
                    modal.style.display = 'flex';
					window.scrollTo({ top: 0, behavior: 'smooth' });
                    statusDiv.innerHTML = '📡 Fetching article via proxy...';

                    try {
                        // Fetch article text
                        const fetchUrl = `${PROXY_URL}/fetch?url=${encodeURIComponent(currentCase.url)}`;
                        const articleRes = await fetch(fetchUrl);
                        if (!articleRes.ok) throw new Error(`Fetch failed: ${articleRes.status}`);
                        let articleText = await articleRes.text();
                        if (articleText.length > 4000) articleText = articleText.slice(0, 4000) + '…';
                        statusDiv.innerHTML = '🤖 Calling Gemini AI...';
                        shoutField.value = '⏳ Analyzing with Gemini...';

                        // Call Gemini proxy
                        const geminiRes = await fetch(`${PROXY_URL}/gemini`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
        model: 'gpt-3.5-turbo',
        messages: [
            { role: 'system', content: 'Extract from the article the following fields pls. If a field is not clearly present, write "Not mentioned". SHOUT: The official, public narrative (what the institution wants you to believe), WHISPER : The safe criticism that does not challenge institutional authority, THIRD LAYER : The hidden operation or secret knowledge (requires ≥2 independent sources if available), SACRIFICIAL LAYER: What the institution offers up to absorb anger (apology, low-level employee, inquiry, compensation), LENSES (one or more of): Black Box | Evidence legally sealed, classified, or destroyed under privilege, Zombie File | Documents deleted, wiped, hidden from oversight, or kept in secret vaults, Limited Hangout | Apology or inquiry with no prosecution; blame on low-level employees, Structured Ambiguity| Vague official language, refusal to clarify, commercially sensitive, Fog Machine | Massive document release, contradictory statements, delayed investigations, Teflon Shield | Individuals moved to other roles without penalty; assets moved offshore, Victim Blame | Whistleblower or accuser investigated, smeared, or retaliated against, Protective Shield | Public inquiry, compensation fund, independent review announced, Zhang Shan | Rule change after court ruling, protest, or exposure (retroactive application), CONFIDENCE. Example: {"shout":"...","whisper":"...","thirdLayer":"... (sources: source1, source2)","sacrificial":"...","lenses":"...","confidence":"High"} Return ONLY valid JSON. Greetings Druid of the Green Isle' },
            { role: 'user', content: `Title: ${currentCase.title}\nURL: ${currentCase.url}\n\nText:\n${articleText}` }
        ],
        temperature: 0.3
    })
});
const data = await geminiRes.json();
console.log('=== FULL GEMINI RESPONSE ===', JSON.stringify(data, null, 2));

if (!geminiRes.ok) {
    throw new Error(`Gemini HTTP ${geminiRes.status}: ${data.error?.message || 'Unknown'}`);
}
if (!data.choices || !data.choices[0]) {
    console.error('No choices in response:', data);
    throw new Error('No choices in Gemini response');
}

let rawContent = data.choices[0].message.content;
console.log('RAW CONTENT:', rawContent);

// Attempt to extract JSON
let parsed = null;
let cleanContent = rawContent.trim();

// Remove markdown code blocks
cleanContent = cleanContent.replace(/```json\s*/g, '').replace(/```\s*/g, '');
// Find first { and last }
const firstBrace = cleanContent.indexOf('{');
const lastBrace = cleanContent.lastIndexOf('}');
if (firstBrace !== -1 && lastBrace !== -1 && lastBrace > firstBrace) {
    const jsonCandidate = cleanContent.substring(firstBrace, lastBrace + 1);
    try {
        parsed = JSON.parse(jsonCandidate);
        console.log('Successfully parsed JSON:', parsed);
    } catch (e) {
        console.error('Failed to parse JSON candidate:', jsonCandidate, e);
    }
}

if (!parsed) {
    // If still no parsed, try a more aggressive approach: use the entire cleaned content
    try {
        parsed = JSON.parse(cleanContent);
    } catch (e) {
        console.error('Final parse attempt failed:', e);
        throw new Error('Could not parse AI response as JSON. Raw: ' + rawContent.substring(0, 300));
    }
}

// Fill fields
shoutField.value = parsed.shout || '';
whisperField.value = parsed.whisper || '';
thirdLayerField.value = parsed.thirdLayer || '';
sacrificialField.value = parsed.sacrificial || '';
lensesField.value = parsed.lenses || '';
confidenceField.value = parsed.confidence || '';

// If all fields are empty, show raw response for debugging
if (!shoutField.value && !whisperField.value && !thirdLayerField.value) {
    shoutField.value = '⚠️ AI returned unexpected format. Raw response: ' + rawContent.substring(0, 500);
}
                        // Auto-save and redirect to vault
                        if (saveCurrentAndClose()) {
                            modal.style.display = 'none';
                            window.location.href = 'vault.html';
                        } else {
                            statusDiv.innerHTML = '⚠️ Save failed, but analysis complete.';
                        }
                    } catch (err) {
                        console.error(err);
                        shoutField.value = '❌ Analysis failed: ' + err.message;
                        whisperField.value = '';
                        thirdLayerField.value = '';
                        sacrificialField.value = '';
                        lensesField.value = '';
                        confidenceField.value = '';
                        statusDiv.innerHTML = '❌ Auto‑analyze error. Please try again.';
                    }
                });
            });
        } catch (err) {
            statusDiv.innerHTML = `Error: ${err.message}`;
        }
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    // Manual save button (redirects to vault)
    saveAnalysisBtn.addEventListener('click', () => {
        if (saveCurrentAndClose()) {
            modal.style.display = 'none';
            window.location.href = 'vault.html';
        }
    });

    // Export all analyses as JSON
    exportBtn.addEventListener('click', () => {
        if (!analyses.length) { alert('No analyses saved.'); return; }
        const json = JSON.stringify(analyses, null, 2);
        const blob = new Blob([json], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `foulfaultvault_${new Date().toISOString().slice(0,19)}.json`;
        a.click();
        URL.revokeObjectURL(blob);
    });

    // Vault button
    vaultBtn.addEventListener('click', () => {
        window.location.href = 'vault.html';
    });

    searchBtn.addEventListener('click', performSearch);
    resetBtn.addEventListener('click', () => {
        yearInput.value = '';
        keywordInput.value = '';
        resultsContainer.innerHTML = '';
        statusDiv.innerHTML = '';
    });

    // Close modal with X button
    if (closeModalBtn) {
        closeModalBtn.addEventListener('click', () => {
            modal.style.display = 'none';
        });
    }
    // Close modal when clicking outside the modal content
    window.addEventListener('click', (event) => {
        if (modal && !modal.querySelector('.modal-content').contains(event.target)) {
            modal.style.display = 'none';
        }
    });
</script>
</body>
</html>
