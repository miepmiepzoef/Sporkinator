<body>
<div id="header-placeholder"></div>
<h1>FoulFaultVault</h1>
<p class="citation">Version 1.1</p>
<div class="container">
    <p class="instructions">Some glasses</p>
	<div class="search-area">
			<div class="input-group"><label>📅 Year (required)</label><input type="number" id="yearInput" placeholder="e.g., 2005" value="2005"></div>
			<div class="input-group"><label>🏷️ Keyword (optional)</label><input type="text" id="keywordInput" placeholder="scandal, cover‑up, leak..."></div>
            <button id="searchBtn">🔎 Search Wikipedia</button>
            <button id="resetBtn" class="reset-btn">⟳ Reset</button>
            <button id="exportBtn" class="export-btn">📤 Export analyses</button>
	</div>
	<div class="status" id="statusMsg">⚡ Enter a year and click Search. Then click "Analyze" and use "Auto‑analyze (AI)".</div>
	<div class="results" id="resultsContainer"></div>
</div>

<div id="analysisModal" class="analysis-modal">
    <div class="modal-content">
        
        <h3>📝 FoulFault analysis</h3>
        <p><strong>Case:</strong> <span id="modalCaseTitle"></span><br><small>🔗 <a id="modalCaseUrl" href="#" target="_blank">open Wikipedia article</a></small></p>
        <button id="autoAnalyzeBtn" class="auto-btn"> Auto-Analyze (AI)</button>
		<hr>
        <div class="layer-field"><label>📢 SHOUT (official narrative)</label><textarea id="shoutField" rows="2" placeholder="Quote the most prominent official statement..."></textarea></div>
        <div class="layer-field"><label>🤫 WHISPER (safe criticism)</label><textarea id="whisperField" rows="2" placeholder="Criticism that does not challenge institutional authority..."></textarea></div>
        <div class="layer-field"><label>🕳️ THIRD LAYER (hidden operation) – requires ≥2 sources</label><textarea id="thirdLayerField" rows="3" placeholder="Describe the concealed activity with evidence..."></textarea></div>
        <div class="layer-field"><label>🐑 SACRIFICIAL LAYER (what was offered up)</label><textarea id="sacrificialField" rows="2" placeholder="Apology, low-level employee, inquiry, compensation..."></textarea></div>
        <div class="layer-field"><label>🔎 Lenses (Black Box, Zombie File, etc.)</label><input type="text" id="lensesField" placeholder="e.g., Fog Machine, Protective Shield"></div>
        <div class="layer-field"><label>🎯 Confidence (High / Medium / Low)</label><input type="text" id="confidenceField" placeholder="High"></div>
        <button id="saveAnalysisBtn" style="margin-top:12px; background:#0a1c2f;">💾 Save</button>
		<button class="close-modal" id="closeModalBtn">&times;</button>
	</div>
</div>
<div id="footer-placeholder"></div>		
<div id="banner-placeholder"></div>
<script>
       // Load header and footer
       		  fetch('../header.html') // adjust path as needed
            	 .then(response => response.text())
           		 .then(data => {
                	document.getElementById('header-placeholder').innerHTML = data;
           		  });

        	fetch('../footer.html')
            	.then(response => response.text())
            	.then(data => {
                	document.getElementById('footer-placeholder').innerHTML = data;
            	});

			fetch('../footer-banner.html')
				.then(response => response.text())
            	.then(data => {
                	document.getElementById('banner-placeholder').innerHTML = data;
            	});
   
	const PROXY_URL = 'https://vault-d9s2z.bunny.run';
	
	let currentCase = null;
	let analyses = [];
	
	// DOM elements
    const searchBtn = document.getElementById('searchBtn');
    const resetBtn = document.getElementById('resetBtn');
    const exportBtn = document.getElementById('exportBtn');
    const yearInput = document.getElementById('yearInput');
    const keywordInput = document.getElementById('keywordInput');
    const statusDiv = document.getElementById('statusMsg');
    const resultsContainer = document.getElementById('resultsContainer');
 
    
    const modalCaseTitle = document.getElementById('modalCaseTitle');
    const modalCaseUrl = document.getElementById('modalCaseUrl');
    const shoutField = document.getElementById('shoutField');
    const whisperField = document.getElementById('whisperField');
    const thirdLayerField = document.getElementById('thirdLayerField');
    const sacrificialField = document.getElementById('sacrificialField');
    const lensesField = document.getElementById('lensesField');
    const confidenceField = document.getElementById('confidenceField');
    const saveAnalysisBtn = document.getElementById('saveAnalysisBtn');
	const autoAnalyzeBtn = document.getElementById('autoAnalyzeBtn');

	const modalTitle = document.getElementById('modalCaseTitle');
	const modal = document.getElementById('analysisModal');

    // Wikipedia search (free, no key)
    async function searchWikipedia(year, keyword) {
        let searchTerm = `${year}`;
        if (keyword && keyword.trim() !=='') {  
			searchTerm = `${year} ${keyword}`;
		} else {
			searchTerm = `${year} scandal OR cover-up OR corruption OR whistleblower OR leak OR investigation`;
		}
		const url = `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(searchTerm)}&format=json&origin=*&srlimit=25`;
        const resp = await fetch(url);
        const data = await resp.json();
        return data.query.search.map(page => ({
            title: page.title,
            snippet: page.snippet.replace(/<span class="searchmatch">/g, '<strong>').replace(/<\/span>/g, '</strong>'),
            url: `https://en.wikipedia.org/wiki/${encodeURIComponent(page.title.replace(/ /g, '_'))}`,
            source: 'Wikipedia'
        }));
    }

    async function performSearch() {
        const year = yearInput.value.trim();
        if (!year || isNaN(year) || year < 1900 || year > 2030) {
            statusDiv.innerHTML = '⚠️ Please enter a valid year (1900–2030).';
            return;
        }
        const keyword = keywordInput.value.trim();
        statusDiv.innerHTML = `🔍 Searching Wikipedia for "${year}" ${keyword ? `+ "${keyword}"` : '...'}`;
        resultsContainer.innerHTML = '<div style="padding:24px; text-align:center;">⏳ Loading...</div>';

        try {
            const results = await searchWikipedia(year, keyword);
			if (!results.length) {
			resultsContainer.innerHTML = '<p>No results. Try different keyword</p>';
				statusDiv.innerHTML = 'No results.';
				return;
			}
		let html = '';
            for (const r of results) {
                html += `<div class="result-item">
                    <strong><a href="${r.url}" target="_blank">${escapeHtml(r.title)}</a></strong>
                    <p>${r.snippet}...</p>
                    <button class="analyze-btn" data-title="${escapeHtml(r.title)}" data-url="${r.url}">🧩 Analyze</button>
                </div>`;
            }
            resultsContainer.innerHTML = html;
            statusDiv.innerHTML = `✅ Found ${results.length} articles. Click "Analyze" then "Auto‑analyze (AI)".`;
            // attach analyze buttons
            document.querySelectorAll('.analyze-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentCase = { title: btn.dataset.title, url: btn.dataset.url };
                    modalCaseTitle.innerText = currentCase.title;
                    modalCaseUrl.href = currentCase.url;
                    // clear fields
                    shoutField.value = whisperField.value = thirdLayerField.value = sacrificialField.value = lensesField.value = confidenceField.value = '';
                    modal.style.display = 'flex';
                });
            });
        } catch (err) {
            statusDiv.innerHTML = `Error: ${err.message}`;
        }
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    // Auto‑analyze using bunny.net proxy
    autoAnalyzeBtn.addEventListener('click', async () => {
        if (!currentCase) {
            alert('No article selected. Click "Analyze" first.');
            return;
        }
        if (!PROXY_URL) {
            alert('PROXY_URL not set. Edit the HTML and put your bunny.net script URL.');
            return;
        }
        autoAnalyzeBtn.disabled = true;
        autoAnalyzeBtn.textContent = '⏳ Analyzing...';
        statusDiv.innerHTML = '📡 Fetching article via proxy...';

        try {
            // Fetch article via your proxy's /fetch endpoint
            const fetchUrl = `${PROXY_URL}/fetch?url=${encodeURIComponent(currentCase.url)}`;
            const articleRes = await fetch(fetchUrl);
            if (!articleRes.ok) throw new Error(`Article fetch failed: ${articleRes.status}`);
            let articleText = await articleRes.text();
            if (articleText.length > 8000) articleText = articleText.slice(0, 8000) + '…';

            statusDiv.innerHTML = '🤖 Calling OpenAI...';
            const geminiRes = await fetch(`${PROXY_URL}/gemini`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: 'gpt-3.5-turbo',
                    messages: [
                        { role: 'system', content: 'Extract from the article: SHOUT (official statement), WHISPER (safe criticism), THIRD LAYER (hidden operation) - provide at least 2 independent sources with citations (e.g., "according to a leaked memo" or "as reported ny X"), SACRIFICIAL LAYER (what was offered up), LENSES (choose from: Black Box, Zombie File, Limited Hangout, Structured Ambiguity, Fog Machine, Teflon Shield, Victim Blame, Protective Shield, Zhang Shan), CONFIDENCE (High/Medium/Low). Respond with JSON only.' },
                        { role: 'user', content: `Title: ${currentCase.title}\nURL: ${currentCase.url}\n\nText:\n${articleText}` }
                    ],
                    temperature: 0.3,
                    response_format: { type: 'json_object' }
                })
            });
            const data = await geminiRes.json();
            if (!geminiRes.ok) throw new Error(`Gemini proxy error: ${data.error || data.message || 'Unknown'}`);
            if (!data.choices || !data.choices[0]) throw new Error('Invalid response from proxy. Check OpenAI key.');
            const parsed = JSON.parse(data.choices[0].message.content);
            document.getElementById('shoutField').value = parsed.shout || '';
            document.getElementById('whisperField').value = parsed.whisper || '';
            document.getElementById('thirdLayerField').value = parsed.thirdLayer || '';
            document.getElementById('sacrificialField').value = parsed.sacrificial || '';
            document.getElementById('lensesField').value = parsed.lenses || '';
            document.getElementById('confidenceField').value = parsed.confidence || '';
            statusDiv.innerHTML = '✅ Analysis complete.';
        } catch (err) {
            console.error(err);
            alert('Auto‑analyze error: ' + err.message);
            statusDiv.innerHTML = '❌ Auto‑analyze failed.';
        } finally {
            autoAnalyzeBtn.disabled = false;
            autoAnalyzeBtn.textContent = '🤖 Auto‑analyze (AI)';
        }
    });

    saveAnalysisBtn.addEventListener('click', () => {
        if (!currentCase) return;
        analyses.push({
            timestamp: new Date().toISOString(),
            title: currentCase.title,
            url: currentCase.url,
            shout: shoutField.value,
            whisper: whisperField.value,
            thirdLayer: thirdLayerField.value,
            sacrificial: sacrificialField.value,
            lenses: lensesField.value,
            confidence: confidenceField.value
        });
        alert('Analysis saved.');
        modal.style.display = 'flex';
    });

    exportBtn.addEventListener('click', () => {
        if (!analyses.length) { alert('No analyses saved.'); return; }
        const json = JSON.stringify(analyses, null, 2);
        const blob = new Blob([json], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `foulfaultvault_${new Date().toISOString().slice(0,19)}.json`;
        a.click();
        URL.revokeObjectURL(blob);
    });

    searchBtn.addEventListener('click', performSearch);
    resetBtn.addEventListener('click', () => {
        yearInput.value = '';
        keywordInput.value = '';
        resultsDiv.innerHTML = '';
        statusDiv.innerHTML = '';
    });
    const closeModalBtn = document.getElementById('closeModalBtn');
	if (closeModalBtn) {
		closeModalBtn.addEventListener('click', () => {
		document.getElementById('analysisModal').style.display = 'none';
		});
	}
	window.addEventListener('click', (event) => {
    	const modal = document.getElementById('analysisModal');
		if (modal && !modal.querySelector('.modal-content').contains(event.target)) {
			modal.style.display = 'none';
		}
	});
</script>
</body>
