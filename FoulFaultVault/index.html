<body>
<div id="header-placeholder"></div>
<h1>FoulFaultVault</h1>
<p class="citation">Search for yourself</p>
<div class="container">
    <p class="instructions">Roadmap; use real data to draw a map.
<div class="search-area">
            <div class="input-group"><label>📅 Year (required)</label><input type="number" id="yearInput" placeholder="e.g., 2005" value="2005"></div>
            <div class="input-group"><label>🏷️ Keyword (optional)</label><input type="text" id="keywordInput" placeholder="scandal, cover‑up, leak..."></div>
            <button id="searchBtn">🔎 Search Wikipedia</button>
            <button id="resetBtn" class="reset-btn">⟳ Reset</button>
            <button id="exportBtn" class="export-btn">📤 Export analyses</button>
        </div>
        	<div class="status" id="statusMsg">⚡ Enter a year and click Search. Then click "Analyze" and use "Auto‑analyze (AI)".</div>
        	<div class="results" id="resultsContainer"></div>
    </div>
    <p class="citation">FoulFaultVault v1.1</p>
</div>

<div id="analysisModal" class="analysis-modal">
    <div class="modal-content">
        <button class="close-modal" id="closeModalBtn">&times;</button>
        <h3>📝 FoulFault analysis</h3>
        <p><strong>Case:</strong> <span id="modalCaseTitle"></span><br><small>🔗 <a id="modalCaseUrl" href="#" target="_blank">open Wikipedia article</a></small></p>
        <hr>
        <div class="layer-field"><label>📢 SHOUT (official narrative)</label><textarea id="shoutField" rows="2" placeholder="Quote the most prominent official statement..."></textarea></div>
        <div class="layer-field"><label>🤫 WHISPER (safe criticism)</label><textarea id="whisperField" rows="2" placeholder="Criticism that does not challenge institutional authority..."></textarea></div>
        <div class="layer-field"><label>🕳️ THIRD LAYER (hidden operation) – requires ≥2 sources</label><textarea id="thirdLayerField" rows="3" placeholder="Describe the concealed activity with evidence..."></textarea></div>
        <div class="layer-field"><label>🐑 SACRIFICIAL LAYER (what was offered up)</label><textarea id="sacrificialField" rows="2" placeholder="Apology, low-level employee, inquiry, compensation..."></textarea></div>
        <div class="layer-field"><label>🔎 Lenses (Black Box, Zombie File, etc.)</label><input type="text" id="lensesField" placeholder="e.g., Fog Machine, Protective Shield"></div>
        <div class="layer-field"><label>🎯 Confidence (High / Medium / Low)</label><input type="text" id="confidenceField" placeholder="High"></div>
        <button id="saveAnalysisBtn" style="margin-top:12px; background:#0a1c2f;">💾 Save this analysis</button>
    </div>
</div>
<div id="footer-placeholder"></div>	
		
<div id="banner-placeholder"></div>
<script>
       // Load header and footer
       		  fetch('../header.html') // adjust path as needed
            	 .then(response => response.text())
           		 .then(data => {
                	document.getElementById('header-placeholder').innerHTML = data;
           		  });

        	fetch('../footer.html')
            	.then(response => response.text())
            	.then(data => {
                	document.getElementById('footer-placeholder').innerHTML = data;
            	});

			fetch('../footer-banner.html')
				.then(response => response.text())
            	.then(data => {
                	document.getElementById('banner-placeholder').innerHTML = data;
            	});
   // DOM elements
	const PROXY_URL = 'https://vault-d9s2z.b-cdn.net';
    const searchBtn = document.getElementById('searchBtn');
    const resetBtn = document.getElementById('resetBtn');
    const exportBtn = document.getElementById('exportBtn');
    const yearInput = document.getElementById('yearInput');
    const keywordInput = document.getElementById('keywordInput');
    const statusDiv = document.getElementById('statusMsg');
    const resultsContainer = document.getElementById('resultsContainer');
    const modal = document.getElementById('analysisModal');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const modalCaseTitle = document.getElementById('modalCaseTitle');
    const modalCaseUrl = document.getElementById('modalCaseUrl');
    const shoutField = document.getElementById('shoutField');
    const whisperField = document.getElementById('whisperField');
    const thirdLayerField = document.getElementById('thirdLayerField');
    const sacrificialField = document.getElementById('sacrificialField');
    const lensesField = document.getElementById('lensesField');
    const confidenceField = document.getElementById('confidenceField');
    const saveAnalysisBtn = document.getElementById('saveAnalysisBtn');

    let currentAnalysisTarget = null;
    let analyses = [];
	
    // Wikipedia search (free, no key)
    async function searchWikipedia(year, keyword) {
        let searchTerm = `${year}`;
        if (keyword && keyword.trim() !== '') {
            searchTerm = `${year} ${keyword}`;
        } else {
            searchTerm = `${year} scandal OR cover-up OR corruption OR whistleblower`;
        }
        const url = `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(searchTerm)}&format=json&origin=*&srlimit=25`;
        const resp = await fetch(url);
        const data = await resp.json();
        return data.query.search.map(page => ({
            title: page.title,
            snippet: page.snippet.replace(/<span class="searchmatch">/g, '<strong>').replace(/<\/span>/g, '</strong>'),
            url: `https://en.wikipedia.org/wiki/${encodeURIComponent(page.title.replace(/ /g, '_'))}`,
            source: 'Wikipedia'
        }));
    }

    async function performSearch() {
        const year = yearInput.value.trim();
        if (!year || isNaN(year) || year < 1900 || year > 2030) {
            statusDiv.innerHTML = '⚠️ Please enter a valid year (1900–2030).';
            return;
        }
        const keyword = keywordInput.value.trim();
        statusDiv.innerHTML = `🔍 Searching Wikipedia for "${year}" ${keyword ? `+ "${keyword}"` : '...'}`;
        resultsContainer.innerHTML = '<div style="padding:24px; text-align:center;">⏳ Loading results from Wikipedia...</div>';

        try {
            const results = await searchWikipedia(year, keyword);
            displayResults(results, year);
            statusDiv.innerHTML = `✅ Found ${results.length} Wikipedia articles. Click "Analyze" to apply the protocol.`;
        } catch (err) {
            statusDiv.innerHTML = `❌ Error: ${err.message}`;
            resultsContainer.innerHTML = `<div style="padding:24px;text-align:center;color:red;">${err.message}</div>`;
        }
    }

	 function displayResults(results, year) {
        if (!results.length) {
            resultsContainer.innerHTML = `<div style="padding:24px;text-align:center;">❌ No results for ${year}.</div>`;
            return;
        }
        let html = '';
        for (const res of results) {
            html += `<div class="result-item">
                <div class="result-title"><a href="${res.url}" target="_blank">${escapeHtml(res.title)}</a></div>
                <div class="result-meta">📄 ${res.source} · ${year}</div>
                <div class="result-snippet">${res.snippet}...</div>
                <button class="analyze-btn" data-title="${escapeHtml(res.title)}" data-url="${res.url}">🧩 Analyze</button>
            </div>`;
        }
        resultsContainer.innerHTML = html;
        document.querySelectorAll('.analyze-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const title = btn.getAttribute('data-title');
                const url = btn.getAttribute('data-url');
                modalCaseTitle.innerText = title;
                modalCaseUrl.href = url;
                shoutField.value = whisperField.value = thirdLayerField.value = sacrificialField.value = lensesField.value = confidenceField.value = '';
                currentAnalysisTarget = { title, url };
                modal.style.display = 'flex';
            });
        });
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }

    autoAnalyzeBtn.addEventListener('click', async () => {
        if (!currentAnalysisTarget) return;
        autoAnalyzeBtn.disabled = true;
        autoAnalyzeBtn.textContent = '⏳ Analyzing...';
        statusDiv.innerHTML = '🤖 Fetching article and calling AI...';
        try {
            const proxyFetch = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(currentAnalysisTarget.url)}`);
            const proxyData = await proxyFetch.json();
            let articleText = proxyData.contents || '';
            if (articleText.length > 8000) articleText = articleText.substring(0, 8000) + '…';

            const systemPrompt = `You are the foulfaultvault engine. Extract from the article:
SHOUT: official statement (quote with source/date)
WHISPER: safe criticism
THIRD LAYER: hidden operation (requires ≥2 sources)
SACRIFICIAL LAYER: what was offered up
LENSES: Black Box, Zombie File, Limited Hangout, Structured Ambiguity, Fog Machine, Teflon Shield, Victim Blame, Protective Shield, Zhang Shan
CONFIDENCE: High (≥3 sources), Medium (2-3), Low (1 or speculative)
Respond with JSON only: {"shout":"...","whisper":"...","thirdLayer":"...","sacrificial":"...","lenses":"...","confidence":"..."}`;

            const response = await fetch(`${PROXY_URL}/openai`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: 'gpt-3.5-turbo',
                    messages: [
                        { role: 'system', content: systemPrompt },
                        { role: 'user', content: `Title: ${currentAnalysisTarget.title}\nURL: ${currentAnalysisTarget.url}\n\nText:\n${articleText}` }
                    ],
                    temperature: 0.3,
                    response_format: { type: "json_object" }
                })
            });
            const data = await response.json();
            const parsed = JSON.parse(data.choices[0].message.content);
            shoutField.value = parsed.shout || '';
            whisperField.value = parsed.whisper || '';
            thirdLayerField.value = parsed.thirdLayer || '';
            sacrificialField.value = parsed.sacrificial || '';
            lensesField.value = parsed.lenses || '';
            confidenceField.value = parsed.confidence || '';
            statusDiv.innerHTML = '✅ AI analysis complete.';
        } catch (err) {
            alert('Auto-analysis failed: ' + err.message);
            statusDiv.innerHTML = '❌ Auto-analysis failed. Check console.';
        } finally {
            autoAnalyzeBtn.disabled = false;
            autoAnalyzeBtn.textContent = '🤖 Auto‑analyze (AI)';
        }
    });

    saveAnalysisBtn.addEventListener('click', () => {
        if (!currentAnalysisTarget) return;
        analyses.push({
            timestamp: new Date().toISOString(),
            caseTitle: currentAnalysisTarget.title,
            caseUrl: currentAnalysisTarget.url,
            shout: shoutField.value,
            whisper: whisperField.value,
            thirdLayer: thirdLayerField.value,
            sacrificial: sacrificialField.value,
            lenses: lensesField.value,
            confidence: confidenceField.value
        });
        alert('✅ Analysis saved.');
        modal.style.display = 'none';
    });

    exportBtn.addEventListener('click', () => {
        if (!analyses.length) { alert('No analyses saved.'); return; }
        const isJson = confirm('OK = JSON, Cancel = CSV');
        const blob = new Blob([isJson ? JSON.stringify(analyses, null, 2) : (() => {
            const headers = ['timestamp','caseTitle','caseUrl','shout','whisper','thirdLayer','sacrificial','lenses','confidence'];
            const rows = analyses.map(a => [a.timestamp, a.caseTitle, a.caseUrl, `"${a.shout.replace(/"/g, '""')}"`, `"${a.whisper.replace(/"/g, '""')}"`, `"${a.thirdLayer.replace(/"/g, '""')}"`, `"${a.sacrificial.replace(/"/g, '""')}"`, `"${a.lenses.replace(/"/g, '""')}"`, a.confidence]);
            return [headers, ...rows].map(row => row.join(',')).join('\n');
        })()], {type: isJson ? 'application/json' : 'text/csv'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `foulfaultvault_${new Date().toISOString().slice(0,19)}.${isJson ? 'json' : 'csv'}`;
        a.click();
        URL.revokeObjectURL(blob);
    });

    searchBtn.addEventListener('click', performSearch);
    resetBtn.addEventListener('click', () => { yearInput.value = ''; keywordInput.value = ''; resultsContainer.innerHTML = ''; statusDiv.innerHTML = '⚡ Ready.'; });
    closeModalBtn.addEventListener('click', () => modal.style.display = 'none');
    window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };
</script>
</body>
</html>
